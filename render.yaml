services:
  # 1. API Backend Service
  - type: web
    name: querymind-api
    runtime: docker
    dockerContext: apps/api
    dockerfilePath: apps/api/Dockerfile
    plan: free
    preDeployCommand: npx prisma db push --accept-data-loss
    envVars:

      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        placeholder: "Paste your Neon database connection string here (postgresql://...)"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: querymind-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEV_AUTH_BYPASS
        value: "false"

  # 2. Next.js Web Frontend Service
  - type: web
    name: querymind-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
        placeholder: "Enter public API URL (e.g. https://querymind-api-uz5w.onrender.com) after creation"

  # 4. Background Worker Service
  - type: worker
    name: querymind-worker
    runtime: docker
    dockerContext: apps/api
    dockerfilePath: apps/api/Dockerfile
    dockerCommand: npm run worker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: web
          name: querymind-api
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: querymind-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: querymind-api
          envVarKey: ENCRYPTION_KEY
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 3. Redis Service (KeyValue store)
  - type: keyvalue
    name: querymind-redis
    plan: free
    ipAllowList: []
